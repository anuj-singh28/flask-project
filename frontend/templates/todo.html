<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do Page</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            margin-top: 100px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        input, textarea {
            width: 90%;
            margin: 10px 0;
            padding: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>To-Do Form</h2>

    <form action="/submittodoitem" method="POST">
        <!-- Item Name -->
        <input type="text" name="itemName" placeholder="Item Name" required>

        <!-- Item Description -->
        <textarea name="itemDescription" placeholder="Item Description" required></textarea>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
